apiVersion: v1
kind: Pod
metadata:
  name: nginx
spec:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: " lables like topology.kubernetes.io/zone:"
            operator: In
            values:
            - "lable value like us-east-1b" 
  containers:
  - name: nginx
    image: nginx
    imagePullPolicy: IfNotPresent